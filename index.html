<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang chủ - IT KHA SERVICE</title>
  
  <!-- Bootstrap Icons & Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/system/logo.png" type="image/png">
  
  <style>
    body {
        background-image: url('images/system/wallpaper.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">

  <main class="main-wrapper">
    <div class="container" id="main-content">
      <div class="page-container">
        <h1 class="page-title text-center">Trang chủ</h1>
        <p class="text-center text-muted mb-5">Chào mừng bạn đến với cổng thông tin hỗ trợ kỹ thuật và vận hành IT KHA SERVICE.</p>
        
        <!-- Phần hiển thị báo cáo từ GitHub -->
        <div id="report-container">
            <div class="text-center py-5">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2 text-muted">Đang tải dữ liệu báo cáo...</p>
            </div>
        </div>
      </div>
    </div>
  </main>
  
  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://kit.fontawesome.com/94472b8613.js" crossorigin="anonymous"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/components.js"></script>
  <script src="js/services/reportService.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
