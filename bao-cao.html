<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BÁO CÁO - IT KHASERVICE</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://kit.fontawesome.com/94472b8613.js" crossorigin="anonymous"></script>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="images/system/logo.png" type="image/png">

  <style>
    body {
        background-image: url('images/system/wallpaper.jpg');
        background-size: cover;
        background-position: center center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }
    /* Style riêng cho form báo cáo */
    .form-card {
        background: white;
        border-radius: var(--radius-card);
        border: 1px solid var(--gray-200);
        box-shadow: var(--shadow-md);
        max-width: 600px;
        width: 100%;
        margin: 0 auto;
        overflow: hidden;
    }
    .card-header {
        background: var(--gray-100);
        padding: var(--sp-4) var(--sp-6);
        border-bottom: 1px solid var(--gray-200);
    }
    .card-header h3 {
        margin: 0;
        font-size: 18px;
        color: var(--primary-color);
        font-weight: 700;
        text-align: center;
    }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">
  <main class="main-wrapper">
    <div class="container d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 160px);">
        <div class="form-card">
          <div class="card-header">
            <h3>BÁO CÁO DOANH THU VÃNG LAI</h3>
          </div>
          <div class="card-body p-4">
            
            <div class="mb-3">
              <label for="project" class="form-label">Chọn dự án</label>
              <div class="custom-select-wrapper">
                <select id="project" class="form-select" style="display: none;">
                  <option value="">-- Chọn dự án --</option>
                  <option>Citizen.TS</option>
                  <option>Citrine</option>
                  <option>Flora Anh Đào</option>
                  <option>Flora Kikyo</option>
                  <option>Horizon</option>
                  <option>Hưng Phát</option>
                  <option>Hưng Phát 2</option>
                  <option>Khánh Hội 1</option>
                  <option>Khánh Hội 2</option>
                  <option>Lan Phương MHBR</option>
                  <option>Nhất Lan 2</option>
                  <option>Orient</option>
                  <option>Phố Gia Phúc</option>
                  <option>Phú Gia</option>
                  <option>R7</option>
                  <option>Sài Gòn Metro</option>
                  <option>Samsora</option>
                  <option>Sen Hồng A</option>
                  <option>Sen Hồng BC</option>
                  <option>Tam Phú</option>
                  <option>TDH Phước Long</option>
                  <option>TDH Riverview</option>
                  <option>The Star</option>
                  <option>The Useful</option>
                  <option>Topaz City - Khối B</option>
                  <option>Topaz Elite Phoenix 1</option>
                  <option>Topaz Elite Phoenix 2</option>
                  <option>Topaz Home 2</option>
                  <option>Vạn Đô</option>
                </select>
                <div class="select-selected">-- Chọn dự án --</div>
                <div class="select-items select-hide"></div>
              </div>
            </div>

            <div class="mb-3">
              <label for="file" class="form-label">Chọn tệp tin đính kèm:</label>
              <input id="file" type="file" class="form-control" accept=".xls,.xlsx">
            </div>

            <button id="sendBtn" class="btn btn-primary w-100 mt-3">GỬI TỆP TIN</button>

            <div id="msg" class="mt-3"></div>
            
            <div class="alert alert-info mt-4 mb-0" role="alert" style="border-radius: 12px; background-color: #f0f9ff; border: none; color: #0c5460;">
              <h6 class="fw-bold mb-2"><i class="bi bi-info-circle-fill me-2"></i>Lưu ý quan trọng:</h6>
              <ul class="mb-0 small" style="padding-left: 1.2rem;">
                <li>Hệ thống chỉ chấp nhận tệp Excel: .xlsx, .xls</li>
                <li>Dung lượng tệp tin không vượt quá 100MB.</li>
                <li>Vui lòng nhập biển số nếu hệ thống không tự nhận diện.</li>
                <li>Đặt tên tệp theo cấu trúc: <b>DỰ ÁN - THỜI GIAN - NGÀY THÁNG</b></li>
              </ul>
            </div>
          </div>
        </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/components.js"></script>
  <script src="js/main.js"></script>
  <script src="js/app.js"></script>
  <script src="js/services/reportService.js"></script>
</body>
</html>
